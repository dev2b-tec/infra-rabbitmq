services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    restart: unless-stopped
    env_file:
      - path: .env.app
        required: false
    environment:
      # RABBITMQ_DEFAULT_USER e RABBITMQ_DEFAULT_PASS vêm do env_file (.env.app / APP_ENV)
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    expose:
      - "5672"
    networks:
      - infra-net
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.rabbitmq.rule=Host(`rabbitmq.dev2b.tec.br`)"
      - "traefik.http.routers.rabbitmq.entrypoints=websecure"
      - "traefik.http.routers.rabbitmq.tls=true"
      - "traefik.http.routers.rabbitmq.tls.certresolver=letsencrypt"
      - "traefik.http.services.rabbitmq.loadbalancer.server.port=15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

volumes:
  rabbitmq_data:

networks:
  infra-net:
    external: true
    name: infra-net
  proxy:
    external: true
    name: proxy
